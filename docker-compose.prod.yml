services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ronda_eletronica
      POSTGRES_USER: ronda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troque-esta-senha}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads_data:
  reports_data:
  caddy_data:
  caddy_config:
